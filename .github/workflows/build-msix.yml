name: Build MSIX for Microsoft Store

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build-msix:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build web frontend
        run: pnpm --filter @workspace/game-world-hub run build
        env:
          VITE_API_BASE: https://gmes.app

      - name: Copy web build into desktop
        shell: pwsh
        run: |
          $src = "artifacts/game-world-hub/dist"
          $dst = "artifacts/game-world-hub-desktop/dist/renderer"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item "$src/*" $dst -Recurse -Force

      - name: Build desktop TypeScript
        working-directory: artifacts/game-world-hub-desktop
        run: pnpm run build:main

      - name: Build MSIX
        working-directory: artifacts/game-world-hub-desktop
        run: pnpm exec electron-builder --win appx --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameWorldHub-msix
          path: artifacts/game-world-hub-desktop/dist-electron/*.msix
          retention-days: 30

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/game-world-hub-desktop/dist-electron/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
