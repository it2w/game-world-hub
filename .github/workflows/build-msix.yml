name: Build MSIX for Microsoft Store

# Trigger by pushing a tag like  desktop-v1.0.1
# or run manually from the Actions tab and supply a version string.
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-msix:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install desktop dependencies
        working-directory: artifacts/game-world-hub-desktop
        run: pnpm install --no-frozen-lockfile

      # ── 4. Version ────────────────────────────────────────────────────────
      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"        # desktop-v1.0.1
          $ver = $tag -replace '^desktop-v', ''  # 1.0.1
          "DESKTOP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Resolve version from manual input
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "1.0.0" }
          "DESKTOP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Stamp version into package.json
        shell: pwsh
        working-directory: artifacts/game-world-hub-desktop
        run: |
          $ver = $env:DESKTOP_VERSION
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8
          Write-Host "package.json version → $ver"

      # ── 5. AppX tile assets ───────────────────────────────────────────────
      # Generates all required Store tile PNGs from build/icon.png via
      # ImageMagick (pre-installed on windows-latest runners).
      - name: Generate AppX icon assets
        working-directory: artifacts/game-world-hub-desktop
        run: node scripts/generate-appx-icons.mjs

      # ── 6. Compile TypeScript ─────────────────────────────────────────────
      - name: Build desktop (TypeScript → dist/)
        working-directory: artifacts/game-world-hub-desktop
        run: pnpm run build:main

      # ── 7. Package MSIX ───────────────────────────────────────────────────
      - name: Build MSIX
        working-directory: artifacts/game-world-hub-desktop
        run: pnpm exec electron-builder --win appx --x64

      # ── 8. Collect artefacts ──────────────────────────────────────────────
      - name: Upload MSIX to Actions artefacts
        uses: actions/upload-artifact@v4
        with:
          name: GameWorldHub-${{ env.DESKTOP_VERSION }}-msix
          path: artifacts/game-world-hub-desktop/dist-electron/*.msix
          retention-days: 30

      # ── 9. Attach to GitHub Release (tag builds only) ─────────────────────
      - name: Attach MSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/game-world-hub-desktop/dist-electron/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
