name: Build & Publish Windows Desktop Installer

# Cross-compiles the Electron desktop app into a signed Windows installer.
# The .exe cannot be produced in the Replit/Linux environment (electron-builder
# needs a Windows toolchain), so this runs on a native windows-latest runner
# and attaches the artifacts to the GitHub Release for the pushed tag.

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs for testing the pipeline without cutting a release.
  workflow_dispatch:

permissions:
  contents: write # required to upload assets to the GitHub Release

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app (renderer)
        shell: bash
        run: pnpm --filter @workspace/game-world-hub run build

      - name: Stage renderer for Electron
        shell: bash
        # main.ts loads renderer/index.html in production and electron-builder
        # packages renderer/**/*, so copy the Vite output into place.
        run: |
          rm -rf artifacts/game-world-hub-desktop/renderer
          mkdir -p artifacts/game-world-hub-desktop/renderer
          cp -r artifacts/game-world-hub/dist/public/. artifacts/game-world-hub-desktop/renderer/

      - name: Check for signing certificate
        id: cert_check
        shell: bash
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          if [ -n "$WINDOWS_CERT_BASE64" ]; then
            echo "has_cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare code-signing certificate
        id: import_cert
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          if ($env:WINDOWS_CERT_BASE64) {
            # Use the real code-signing certificate supplied via repo secret.
            $pfxPath = Join-Path $env:RUNNER_TEMP "code-sign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
            "csc_link=$pfxPath" >> $env:GITHUB_OUTPUT
            Write-Host "Using code-signing certificate from WINDOWS_CERT_BASE64 secret."
          } else {
            # Fall back to an ephemeral self-signed certificate so the installer
            # is still signed. SmartScreen may warn until a real cert is added.
            $pfxPwd = [Guid]::NewGuid().ToString("N")
            $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=Game World Hub" `
              -CertStoreLocation Cert:\CurrentUser\My `
              -KeyExportPolicy Exportable `
              -KeyUsage DigitalSignature
            $pfxPath = Join-Path $env:RUNNER_TEMP "self-signed.pfx"
            $secure = ConvertTo-SecureString -String $pfxPwd -Force -AsPlainText
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $secure | Out-Null
            "csc_link=$pfxPath" >> $env:GITHUB_OUTPUT
            "self_signed_password=$pfxPwd" >> $env:GITHUB_OUTPUT
            Write-Host "::warning::No WINDOWS_CERT_BASE64 secret set - signing with an ephemeral self-signed certificate. Windows SmartScreen may still warn users. Add WINDOWS_CERT_BASE64 and WINDOWS_CERT_PASSWORD secrets to sign with a trusted certificate."
          }

      - name: Build Windows installer
        shell: bash
        working-directory: artifacts/game-world-hub-desktop
        env:
          # electron-builder reads these to sign the NSIS installer + portable exe.
          CSC_LINK: ${{ steps.import_cert.outputs.csc_link }}
          CSC_KEY_PASSWORD: ${{ steps.cert_check.outputs.has_cert == 'true' && secrets.WINDOWS_CERT_PASSWORD || steps.import_cert.outputs.self_signed_password }}
          # Do not let electron-builder attempt to publish; we upload explicitly below.
          GH_TOKEN: ''
        run: pnpm run build:win

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/game-world-hub-desktop/dist-electron/*.exe
          if-no-files-found: error

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/game-world-hub-desktop/dist-electron/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
