<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';" />
  <title>GWH Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width:  360px;
      height: 100px;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .toast {
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, rgba(8,8,14,0.97) 0%, rgba(12,12,20,0.97) 100%);
      border: 1px solid rgba(0,255,100,0.2);
      border-left: 3px solid #00ff64;
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(0,255,100,0.08),
        0 4px 24px rgba(0,0,0,0.7),
        0 0 20px rgba(0,200,80,0.08);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(0,255,100,0.1);
      border: 1px solid rgba(0,255,100,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 17px;
    }

    .content {
      flex: 1;
      min-width: 0;
    }

    .source {
      font-size: 9px;
      color: #00ff64;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 3px;
      opacity: 0.8;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .body {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dismiss {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.25);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .dismiss:hover { color: rgba(255,255,255,0.6); }

    /* Countdown strip */
    .countdown {
      position: absolute;
      bottom: 0;
      left: 3px;
      right: 0;
      height: 2px;
      border-bottom-right-radius: 8px;
      background: rgba(0,255,100,0.25);
      transform-origin: left;
      animation: countdown-bar var(--duration, 5s) linear forwards;
    }
    @keyframes countdown-bar {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="icon-wrap" id="icon">🎮</div>
    <div class="content">
      <div class="source">Game World Hub</div>
      <div class="title" id="title">Notification</div>
      <div class="body"  id="body"></div>
    </div>
    <div class="dismiss" id="dismiss">✕</div>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    const ICONS = {
      friend:  '👥',
      party:   '🎮',
      message: '💬',
      info:    '🔔',
    };

    const toast    = document.getElementById('toast');
    const iconEl   = document.getElementById('icon');
    const titleEl  = document.getElementById('title');
    const bodyEl   = document.getElementById('body');
    const dismiss  = document.getElementById('dismiss');
    const countdown = document.getElementById('countdown');

    // Show when main process sends overlay-notify
    if (window.ipcRenderer) {
      window.ipcRenderer.on('overlay-notify', (_e, notif) => renderNotif(notif));
    }

    // Fallback: listen via a global that the preload exposes
    window.addEventListener('gwh-overlay-notify', e => renderNotif(e.detail));

    function renderNotif(notif) {
      iconEl.textContent  = ICONS[notif.icon] ?? '🔔';
      titleEl.textContent = notif.title || 'Game World Hub';
      bodyEl.textContent  = notif.body  || '';

      // Reset countdown animation
      const duration = 5;
      countdown.style.setProperty('--duration', duration + 's');
      countdown.style.animation = 'none';
      void countdown.offsetWidth; // reflow
      countdown.style.animation = '';

      toast.classList.add('visible');
    }

    dismiss.addEventListener('click', () => {
      toast.style.transition = 'opacity 0.3s, transform 0.3s';
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(20px)';
    });

    window.addEventListener('dismiss', () => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(20px)';
    });
  </script>
</body>
</html>
